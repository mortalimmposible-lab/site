<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОГЭ Инфо — подготовка к ОГЭ по информатике</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header stepik-header">
            <div class="logo"><span class="logo-text">ОГЭ Инфо</span></div>
            <nav class="nav" style="justify-content: flex-start; gap: 20px;">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="courses.html" class="nav-link">Курсы</a>
                <a href="tasks.html" class="nav-link">Задания</a>
                <button id="theme-toggle" class="theme-btn" aria-label="Сменить тему">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </header>
        <main class="main">
            <h1 class="page-title animate-title">Подготовка к ОГЭ по информатике</h1>
            <p class="page-subtitle animate-subtitle">Теория, примеры, разборы — всё, что нужно для успешной сдачи</p>
            <div class="features-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin: 40px 0;">
                <a href="courses.html" class="feature-card-link">
                    <div class="feature-card">
                        <i class="fas fa-book-open" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"></i>
                        <h3>Теоретические материалы</h3>
                        <p>Подробные объяснения по каждой теме кодификатора.</p>
                    </div>
                </a>
                <a href="tasks.html" class="feature-card-link">
                    <div class="feature-card">
                        <i class="fas fa-tasks" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"></i>
                        <h3>Задания</h3>
                        <p>Типовые задачи из ОГЭ.</p>
                    </div>
                </a>
            </div>
        </main>
        <footer class="footer">
            <p>&copy; 2026 ОГЭ Инфо Саттаров Артём</p>
        </footer>
    </div>
    <script src="theme.js"></script>
    <style>
        .feature-card-link {
            text-decoration: none;
            display: block;
            transition: transform 0.2s;
        }
        .feature-card-link:hover {
            transform: translateY(-5px);
        }
        .feature-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: box-shadow 0.2s;
            cursor: pointer;
        }
        .feature-card-link:hover .feature-card {
            box-shadow: 0 10px 25px -5px var(--accent);
        }
    </style>
</body>
</html>
