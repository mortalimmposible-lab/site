<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОГЭ Инфо — подготовка к ОГЭ по информатике</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-text">ОГЭ Инфо</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="courses.html" class="nav-link">Курсы</a>
                <button id="theme-toggle" class="theme-btn" aria-label="Сменить тему">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </header>
        <main class="main">
            <h1 class="page-title animate-title">Подготовка к ОГЭ по информатике</h1>
            <p class="page-subtitle animate-subtitle">Теория, примеры, разборы — всё, что нужно для успешной сдачи</p>
            <div class="features-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin: 40px 0;">
                <div class="feature-card" style="background: var(--card-bg); padding: 20px; border-radius: 20px; text-align: center;">
                    <i class="fas fa-book-open" style="font-size: 3rem; color: var(--accent);"></i>
                    <h3>Теория</h3>
                    <p>Основные понятия и формулы по каждому заданию.</p>
                </div>
                <div class="feature-card" style="background: var(--card-bg); padding: 20px; border-radius: 20px; text-align: center;">
                    <i class="fas fa-tasks" style="font-size: 3rem; color: var(--accent);"></i>
                    <h3>Примеры</h3>
                    <p>Разбор типовых задач с кнопкой "Показать решение".</p>
                </div>
            </div>
        </main>
        <footer class="footer">
            <p>&copy; 2026 ОГЭ Инфо</p>
        </footer>
    </div>
    <script src="theme.js"></script>
</body>
</html>
